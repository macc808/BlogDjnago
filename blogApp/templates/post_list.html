<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Список постів</title>
</head>
<body>
    <h1>Список постів</h1>
    <ul>
        {% for post in posts %}
            <li>
                <strong>{{ post.title }}</strong>
                <br>
                <small>{{ post.published_date }}</small>
            </li>
        {% empty %}
            <li>Пости відсутні.</li>
        {% endfor %}
    </ul>
</body>
</html>
